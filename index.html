<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحنين - رسالة خاصة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-color: #ff4a75;
  --bg-gradient: linear-gradient(135deg, #ffdde6 0%, #ffb6c1 100%);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Tajawal', sans-serif;
}

body {
  background: var(--bg-gradient);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow-x: hidden;
  position: relative;
}

.heart-particle, .bear-particle {
  position: absolute;
  font-size: 20px;
  animation: fall linear infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes fall {
 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

.container {
  width: 100%;
  max-width: 460px;
  text-align: center;
  z-index: 10;
  position: relative;
}

.photos {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.photos img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid white;
  object-fit: cover;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.header h1 {
  color: white;
  font-size: 36px;
  font-weight: 700;
  text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

.avatar {
  font-size: 60px;
  margin: 15px 0;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
 0%, 100% { transform: translateY(0) scale(1); }
 50% { transform: translateY(-12px) scale(1.05); }
}

.receiver {
  font-size: 22px;
  font-weight: 700;
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.sender-info {
  color: rgba(255,255,255,0.9);
  font-size: 16px;
  margin-bottom: 25px;
  font-weight: 500;
}

.story-box {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(10px);
  border-right: 5px solid white;
  padding: 18px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.7;
  color: white;
  margin-bottom: 30px;
  text-align: justify;
}

.questions-container {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.btn-question {
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(8px);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.4);
  padding: 18px 20px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: right;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.btn-question:hover {
  background: white;
  color: var(--primary-color);
  transform: translateY(-3px);
}

.popup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(5px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  padding: 20px;
}

.popup-content {
  background: white;
  padding: 30px 25px;
  border-radius: 24px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  animation: scaleUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes scaleUp {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.close-btn {
  background: var(--primary-color);
  color: white;
  border: none;
  padding: 12px 35px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  width: 100%;
}

.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 24px;
  cursor: pointer;
  z-index: 100;
}
</style>
</head>
<body>

<div id="hearts-container"></div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div class="photos">
    <img src="mohammed.jpg" alt="محمد">
    <img src="anwar.jpg" alt="أنوار">
  </div>

  <div class="header">
    <h1>الحنين</h1>
    <div class="avatar">🧸❤️</div>
    <p class="receiver">إلى أنوار ❤️</p>
    <p class="sender-info">من محمد</p>
  </div>

  <div class="story-box">
    علاقتنا بدأت في الفاشر قبل سنتين، والحرب فرقتنا بين تشاد والسودان، لكن القلوب ما اتفرقت وعمرها ما حتفرّق.
  </div>

  <div class="questions-container">
    <button class="btn-question" onclick="showAnswer('عرفت من عيونك واهتمامك الزائد وتفاصيلك الصغيرة الما بتشبه زول تاني.', '✨')">أول مرة عرفتِ إنك بتحبيني متين؟</button>
    <button class="btn-question" onclick="showAnswer('طيبتك النادرة، وضحتك البتخليني أنسى كل تعب الدنيا وظروف الحرب السعبة.', '🌸')">أكثر حاجة بحبها فيكِ شنو؟</button>
    <button class="btn-question" onclick="showAnswer('حنسكت مسافة نتأمل ملامح بعض، وبعدها نبكي من الفرحة ونحمد الله المجمعنا بعد غياب.', '🤝')">لو اتقابلنا أول مرة هنعمل شنو؟</button>
    <button class="btn-question" onclick="showAnswer('بزعل لدقيقة بس لما أحس إنك بعيدة، لكن مجرد كلمة ورسالة منك بترجع كل شيء سمح.', '💕')">بتزعلِ مني سريع ولا لا؟</button>
    <button class="btn-question" onclick="showAnswer('نفسي أقول ليك إنك أملي الوحيد الجاي الما مستعد أخسرو نهائي مهما كانت الظروف.', '✉')">نفسي أقول ليك شنو وما قادر؟</button>
    <button class="btn-question" onclick="showAnswer('أكيد حختارك إنتي وفي نفس المكان والزمان وبكل تفاصيلنا بدون أي تردد.', '⏳')">لو رجع بينا الزمن، هتختاري شنو؟</button>
  </div>
</div>

<div class="popup" id="answerPopup" onclick="checkClose(event)">
  <div class="popup-content" onclick="event.stopPropagation()">
    <div class="popup-icon" id="popupIcon">💖</div>
    <p class="popup-text" id="popupText"></p>
    <button class="close-btn" onclick="closePopup()">إغلاق</button>
  </div>
</div>

<script>
function toggleMusic() {
  const music = document.getElementById('bgMusic');
  if (music.paused) music.play();
  else music.pause();
}

function showAnswer(answer, icon) {
  document.getElementById('popupText').innerText = answer;
  document.getElementById('popupIcon').innerText = icon || '💖';
  document.getElementById('answerPopup').style.display = 'flex';
}

function closePopup() {
  document.getElementById('answerPopup').style.display = 'none';
}

function checkClose(e) {
  if(e.target.id === 'answerPopup') closePopup();
}

function createHearts() {
  const container = document.getElementById('hearts-container');
  const symbols = ['❤', '💖', '❣', '💕', '🧸'];
  setInterval(() => {
    const item = document.createElement('div');
    item.classList.add(Math.random() > 0.7 ? 'bear-particle' : 'heart-particle');
    item.innerText = symbols[Math.floor(Math.random() * symbols.length)];
    item.style.left = Math.random() * 100 + 'vw';
    item.style.animationDuration = (Math.random() * 3 + 3) + 's';
    item.style.fontSize = (Math.random() * 15 + 20) + 'px';
    container.appendChild(item);
    setTimeout(() => item.remove(), 6000);
  }, 500);
}

window.onload = createHearts;
</script>
</body>
</html>
