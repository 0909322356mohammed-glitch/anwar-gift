<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هدية لأنوار ❤️</title>
<style>
body {
  margin:0;
  font-family: 'Cairo', Tahoma, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  direction: rtl;
  overflow-x: hidden;
}
@keyframes gradient {
 0% {background-position: 0% 50%;}
 50% {background-position: 100% 50%;}
 100% {background-position: 0% 50%;}
}

.card {
  background: rgba(255,255,255,0.9);
  padding:25px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  max-width:380px;
  width:90%;
  position: relative;
  z-index: 2;
}

h1 {color:#e91e63; margin-bottom:10px;}
p {color:#555; line-height:1.8;}

.btn {
  background:#e91e63;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  margin:8px 0;
  width:100%;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover {background:#d81b60; transform: scale(1.02);}

.answer {
  margin-top:15px;
  font-size:18px;
  color:#333;
  opacity:0;
  transition:0.5s;
}
.answer.show {opacity:1;}

.teddy {
  font-size: 50px;
  margin: 10px 0;
  animation: bounce 2s infinite;
}
@keyframes bounce {
 0%, 100% {transform: translateY(0);}
 50% {transform: translateY(-10px);}
}

.candle {
  font-size: 30px;
  animation: flicker 1.5s infinite;
}
@keyframes flicker {
 0%, 100% {opacity: 1;}
 50% {opacity: 0.7;}
}

.heart {
  position: fixed;
  font-size: 20px;
  animation: fall 5s linear infinite;
  color: #ff4d6d;
  z-index: 1;
}
@keyframes fall {
 0% {top: -10%; opacity: 1;}
 100% {top: 110%; opacity: 0;}
}
</style>
</head>
<body>
<div class="candle">🕯️</div>
<div class="card">
  <h1>هدية من محمد إبراهيم محمد إلى أنوار صالح الزين الكنزي</h1>
  <div class="teddy">🧸</div>
  <p>❤️ إلى أنوار</p>
  <p>من محمد</p>

  <div style="border:1px dashed #e91e63; padding:15px; border-radius:12px; margin:15px 0;">
    <p>علاقتنا بدت في الفاشر قبل سنتين، والحرب فرقتنا بين تشاد والسودان، لكن القلوب ما اتفرقت.</p>
  </div>

  <button class="btn" onclick="showAnswer(0)">أول مرة عرفت إنكِ بتحبيني متين؟</button>
  <button class="btn" onclick="showAnswer(1)">أكتر حاجة بحبها فيكِ شنو؟</button>
  <button class="btn" onclick="showAnswer(2)">لو اتقابلنا أول مرة حنعمل شنو؟</button>
  <button class="btn" onclick="showAnswer(3)">بتزعلي مني سريع ولا لا؟</button>
  <button class="btn" onclick="showAnswer(4)">نفسي أقول ليك شنو وما قادر؟</button>
  <button class="btn" onclick="showAnswer(5)">لو رجع بينا الزمن، حتختاري شنو؟</button>
  <button class="btn" onclick="showAnswer(6)">تفتكري أنا بحبك أكتر ولا إنتي؟</button>
  <button class="btn" onclick="showAnswer(7)">أكتر لحظة حسيتي فيها إني بحبك جد؟</button>

  <div class="answer" id="answer"></div>
  
  <audio id="music" loop>
    <source src="https://cdn.pixabay.com/audio/2024/12/10/audio_9c9a7b5f5e.mp3" type="audio/mpeg">
  </audio>
  <button class="btn" style="background:#555; margin-top:15px;" onclick="toggleMusic()">🎵 شغّل/أوقف الموسيقى</button>
</div>

<script>
const answers = [
  "يوم لقوق لمتوم، وعرفت بيناتملك هواي لوان م",
  "لإبتسامتك، وطيبتك، وحنانك... ما في زول زيك",
  "أمسك يدك وأمشي معاك محل ما دايرة نروح",
  "توقول لوط، يعني إنت عارف تسكت قال ليك ما تزعلتب",
  "بنتحب بعض زي ما بلا انملو ما يعرف احنا ر نهشو",
  "متمسك ببيناتنا، ما بنفراقت انام ليل لوقبو متخاخ",
  "تبيبقي لي أنا، وأنا ليك، ما بنتغير كيف",
  "أهلك لما يتضحكو، يعني يقول لي 😍 يعني داون"
];

function showAnswer(index){
  const answerDiv = document.getElementById('answer');
  answerDiv.classList.remove('show');
  setTimeout(() => {
    answerDiv.innerText = answers[index];
    answerDiv.classList.add('show');
  }, 200);
}

function toggleMusic(){
  const music = document.getElementById('music');
  if(music.paused) music.play();
  else music.pause();
}

function createHeart(){
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML = '❤️';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.animationDuration = Math.random() * 3 + 2 + 's';
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);
</script>
</body>
</html>
